# rs.obayito.com — SPA static + orders API reverse proxy
# Install / refresh:
#   docker run --rm -v $PWD/deploy/nginx-rs.obayito.com.conf:/src/rs.conf:ro \
#     -v /etc/nginx/sites-available:/dst alpine:3.20 cp /src/rs.conf /dst/rs.obayito.com.conf
#   # reload host nginx master (HUP)
#
# Static UI:
#   rsync -a --delete web/dist/ /var/www/orders-ui/
# API:
#   orders serve on 127.0.0.1:8080

upstream orders_api {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name rs.obayito.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rs.obayito.com;

    ssl_certificate     /etc/letsencrypt/live/rs.obayito.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rs.obayito.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 6m;

    # API
    location /v1/ {
        proxy_pass http://orders_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://orders_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Ops SPA (Vite build in /var/www/orders-ui)
    root /var/www/orders-ui;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
