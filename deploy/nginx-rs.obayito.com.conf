# rs.obayito.com — order.rs HTTP API reverse proxy
# Install:
#   sudo cp deploy/nginx-rs.obayito.com.conf /etc/nginx/sites-available/rs.obayito.com.conf
#   sudo ln -sf /etc/nginx/sites-available/rs.obayito.com.conf /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d rs.obayito.com
#   sudo nginx -t && sudo systemctl reload nginx

upstream orders_api {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name rs.obayito.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rs.obayito.com;

    # After first certbot run these paths exist; certbot --nginx may rewrite this block.
    ssl_certificate     /etc/letsencrypt/live/rs.obayito.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rs.obayito.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;

    location / {
        proxy_pass http://orders_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
